aid: chatwoot-com
url: https://raw.githubusercontent.com/api-evangelist/chatwoot-com/refs/heads/main/apis.yml
name: Chatwoot
kind: company
description: Chatwoot is an open-source customer engagement and support suite that
  unifies email, live-chat, social, and messaging channels into a single shared
  inbox. Agents, teams, contacts, conversations, and messages are all managed
  through a REST API surface split across an Application API, a Client API for
  end-user widgets, and a Platform API for super-admin installation control.
  Chatwoot is available as self-hostable open-source software and as Chatwoot
  Cloud.
image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
tags:
- Customer Support
- Customer Engagement
- Shared Inbox
- Live Chat
- Open Source
- Omnichannel
- Help Desk
created: '2026-07-01'
modified: '2026-07-01'
